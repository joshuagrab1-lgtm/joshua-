<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake mit Highscore</title>
    <style> 
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #222222;
        }
        canvas {
            border: 2px solid rgb(50, 83, 47);
            touch-action: none;
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas> 

<script>

let canvas = document.getElementById('canvas'); // damit wir auf die Seite zu greifen können 
let ctx = canvas.getContext('2d');

let rows = 20; // definiert die Grösse des Spielfeld 20*20
let cols = 20;
let cellWidth; // breite eines Kästchens 
let cellHeight; // höhe eines Kästchen 

// Spielfeld Grösse automatisch anpassen , damit es auch auf dem Handy funktioniert
function resizeCanvas() {
    const maxSize = 700; // maximale Größe des Spielfeldes
    const size = Math.min(window.innerWidth * 0.95, window.innerHeight * 0.95, maxSize); // Größe an Bildschirm anpassen

    canvas.width = size;
    canvas.height = size; 

    cellWidth = canvas.width / cols;
    cellHeight = canvas.height / rows;
}

resizeCanvas(); // Canvas einmal anpassen
window.addEventListener("resize", resizeCanvas);

let snake = [{x: 10, y: 10}]; // Hier started der Kopf der Schlange und in welche Richtung 
let direction = 'LEFT';
let food = {x: 5, y: 5};
let foodCollected = false;

let score = 0;
let highscore = localStorage.getItem('highscore') || 0; // auktuelle Punktzahl welche du hast 

// Start
placeFood();//setzt die Frucht zufällig auf das Spielfeld
document.addEventListener('keydown', keyDown); //hört auf Pfeiltasten, damit du die Schlange steuern kannst.
setInterval(gameLoop, 250);// ruft alle 200 Millisekunden die Hauptfunktion gameLoop() auf, damit die Schlange sich bewegt und das Spiel weiterläuft.
draw();//zeichnet die Schlange, die Frucht und den Score auf den Canvas.

//Für Handy Touchscreen - "Dieser Abschnittt wurde mit AI Hilfe generiert"
let touchStartX = 0;
let touchStartY = 0;

document.addEventListener("touchstart", e=>{
    touchStartX=e.changedTouches[0].screenX;
    touchStartY=e.changedTouches[0].screenY;
});

document.addEventListener("touchend", e=>{
    let dx = e.changedTouches[0].screenX - touchStartX;
    let dy = e.changedTouches[0].screenY - touchStartY;

    if (Math.abs(dx) > Math.abs(dy)) { // horizontal
        if (dx > 0 && direction !== "LEFT") direction = "RIGHT";
        if (dx < 0 && direction !== "RIGHT") direction = "LEFT";
    } else { // vertikal
        if (dy > 0 && direction !== "UP") direction = "DOWN";
        if (dy < 0 && direction !== "DOWN") direction = "UP";
    }
});

function draw() {
    // Hintergrund
    ctx.fillStyle = 'black'; // die Farbe für den Hintergrund 
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Schlange
    snake.forEach((part, index) => { // Das ist der Schwanz der Schlange  
        if (index === 0) {
            drawHead(part.x, part.y);
        } else {
            ctx.fillStyle = 'white';
            add(part.x, part.y);
        }
    });

    // Essen
    ctx.fillStyle = 'yellow'; // malt die Frucht gelb an 
    add(food.x, food.y);

    // Score & Highscore
    ctx.fillStyle = 'white'; // zeigt den aktuellen Scor und Highscore oben links 
    ctx.font = '20px Arial';
    ctx.fillText("Score: " + score, 10, 25);
    ctx.fillText("Highscore: " + highscore, 10, 50);

    requestAnimationFrame(draw); // Damit das Spiel automatisch läuft 
}

function add(x, y) {
    ctx.fillRect(x * cellWidth, y * cellHeight, cellWidth - 1, cellHeight - 1); // malt ein Kästchen auf das Spielfeld und -1 definiert den Abstand zwischen den Kästchen
}

function drawHead(x, y) {
    ctx.fillStyle = 'white'; // malt den Kopf der Schlange rot 
    add(x, y);

    ctx.fillStyle = 'black';
    let eyeSize = cellWidth / 6;
    let leftEyeX = x * cellWidth + cellWidth * 0.25;// und der ganze Code malt einfach ein Quadrat im Quadrat das sind dann die Augen 
    let rightEyeX = x * cellWidth + cellWidth * 0.65;
    let eyeY = y * cellHeight + cellHeight * 0.3;
    ctx.fillRect(leftEyeX, eyeY, eyeSize, eyeSize);
    ctx.fillRect(rightEyeX, eyeY, eyeSize, eyeSize);
}

function shiftSnake() {
    for (let i = snake.length - 1; i > 0; i--) { // jedes Körperteil wenn du neine Frucht isst nimmt die Frucht eine neue Position ein 
        snake[i].x = snake[i - 1].x;
        snake[i].y = snake[i - 1].y;
    }
}

function gameLoop() {
    testGameOver();//Checkt, ob das Spiel zu Ende ist.

    if (foodCollected) { // Wenn die Schlange eine Frucht gefressen hat (foodCollected) → Schlange wächst.
        snake = [{x: snake[0].x, y: snake[0].y}, ...snake];
        foodCollected = false;
    }

    shiftSnake(); // shiftSnake() → alle Körperteile folgen dem Kopf.

    // Bewegung
    if (direction === 'LEFT') snake[0].x--; // und das ist die richtung in welche die Schlange geht ⬆️⬇️⬅️➡️ wenn du den Knopf drückst
    if (direction === 'RIGHT') snake[0].x++;// rechts 
    if (direction === 'UP') snake[0].y--; // hoch
    if (direction === 'DOWN') snake[0].y++; // runter 

    testSelfCollision();//Prüft, ob die Schlange sich selbst beißt 

    // Essen gegessen?
    if (snake[0].x === food.x && snake[0].y === food.y) {
        foodCollected = true;
        score++; //Prüft, ob der Kopf auf der Frucht steht → Frucht gegessen, Score erhöht, Highscore aktualisiert und neue Frucht wird erstellt.
        if (score > highscore) {
            highscore = score;
            localStorage.setItem('highscore', highscore);
        }
        placeFood();
    }
}

function placeFood() {//Platziert die Frucht zufällig auf dem Spielfeld.
    let randomX = Math.floor(Math.random() * cols); 
    let randomY = Math.floor(Math.random() * rows);
    food = {x: randomX, y: randomY};
}

function testGameOver() {
    if (snake[0].x < 0 || snake[0].x >= cols || snake[0].y < 0 || snake[0].y >= rows) { //Prüft, ob der Kopf die Spielfeldgrenze berührt.
        resetGame(); // Wenn ja → Spiel zurücksetzen
    }
}

function testSelfCollision() {
    for (let i = 1; i < snake.length; i++) { // Prüft, ob der Kopf auf einen Teil der Schlange trifft.
        if (snake[0].x === snake[i].x && snake[0].y === snake[i].y) { //Wenn ja → Spiel zurücksetzen.
            resetGame();
        }
    }
}

function resetGame() { // Setzt die Schlange wieder auf die Startposition.
    snake = [{x: 10, y: 10}]; 
    direction = 'LEFT';  //Highscore wird zurückgesetzt auf 0.
    score = 0; // Neue Frucht wird platziert.
    placeFood();
}

function keyDown(e) {
    if (e.keyCode === 37 && direction !== 'RIGHT') direction = 'LEFT'; // und das ist die Richtung in welche die Schlange geht ⬆️⬇️⬅️➡️ wenn du den Knopf drückst
    if (e.keyCode === 38 && direction !== 'DOWN') direction = 'UP'; 
    if (e.keyCode === 39 && direction !== 'LEFT') direction = 'RIGHT';
    if (e.keyCode === 40 && direction !== 'UP') direction = 'DOWN';
}

</script>

</body>
</html>
